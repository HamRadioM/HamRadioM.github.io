{{- $url := .Destination | safeURL -}}
{{- $isExternal := or (hasPrefix .Destination "http://") (hasPrefix .Destination "https://") -}}
{{- $openInNewTab := $isExternal -}}
<a href="{{ $url }}"{{ with .Title }} title="{{ . }}"{{ end }}{{ if $openInNewTab }} target="_blank" rel="noopener noreferrer"{{ end }}>{{ .Text | safeHTML }}</a>
